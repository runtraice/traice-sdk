[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "traice-sdk"
dynamic = ["version"]
description = "Non-blocking LLM cost attribution for trAIce"
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
authors = [{ name = "trAIce" }]
keywords = ["llm", "openai", "anthropic", "cost", "observability", "monitoring"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

[project.urls]
Documentation = "https://runtraice.github.io/traice-sdk/docs/python-sdk"
Issues = "https://github.com/runtraice/traice-sdk/issues"
Repository = "https://github.com/runtraice/traice-sdk"

[project.optional-dependencies]
dev = ["build>=1.2", "pytest>=8", "ruff>=0.11"]

[tool.hatch.build.targets.wheel]
packages = ["src/traice"]

[tool.hatch.version]
path = "src/traice/_version.py"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 110
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
