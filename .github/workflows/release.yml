name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for pending changesets
        id: changesets
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets found; create and merge a version PR before publishing."
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v7
        if: steps.changesets.outputs.pending == 'false'
        with:
          node-version: 24
      - name: Install dependencies
        if: steps.changesets.outputs.pending == 'false'
        run: npm ci
      - name: Validate release
        if: steps.changesets.outputs.pending == 'false'
        run: npm run check
      - name: Publish versioned packages
        if: steps.changesets.outputs.pending == 'false'
        run: npm exec -- changeset publish
