name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check for pending changesets
        id: changesets
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | grep -q .; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets found; create and merge a version PR before publishing."
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v7
        if: steps.changesets.outputs.pending == 'false'
        with:
          node-version: 24
      - name: Install dependencies
        if: steps.changesets.outputs.pending == 'false'
        run: npm ci
      - name: Validate release
        if: steps.changesets.outputs.pending == 'false'
        run: npm run check
      - name: Determine unpublished packages
        id: release_plan
        if: steps.changesets.outputs.pending == 'false'
        shell: bash
        run: |
          packages=()
          for package_dir in packages/protocol packages/collector packages/sdk; do
            package_name="$(node -p "require('./${package_dir}/package.json').name")"
            local_version="$(node -p "require('./${package_dir}/package.json').version")"
            published_version="$(npm view "$package_name" version 2>/dev/null || true)"
            if [[ "$local_version" != "$published_version" ]]; then
              packages+=("${package_name}@${local_version}")
            fi
          done

          if (( ${#packages[@]} > 0 )); then
            printf -v package_list '%s, ' "${packages[@]}"
            package_list="${package_list%, }"
            echo "pending=true" >> "$GITHUB_OUTPUT"
            echo "message=Published ${package_list} to npm (latest)." >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
            echo "No unpublished package versions found."
          fi
      - name: Publish versioned packages
        id: publish
        if: steps.release_plan.outputs.pending == 'true'
        shell: bash
        run: |
          output="$(npm exec -- changeset publish 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'packages published successfully' <<< "$output"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Notify Slack of published packages
        if: steps.publish.outputs.published == 'true' && env.SLACK_SDK_RELEASES_WEBHOOK != ''
        env:
          SLACK_SDK_RELEASES_WEBHOOK: ${{ secrets.SLACK_SDK_RELEASES_WEBHOOK }}
          RELEASE_MESSAGE: ${{ steps.release_plan.outputs.message }}
        shell: bash
        run: |
          if [[ "$SLACK_SDK_RELEASES_WEBHOOK" != https://hooks.slack.com/services/* ]]; then
            echo "::warning::SLACK_SDK_RELEASES_WEBHOOK must contain only a Slack webhook URL; skipping notification."
            exit 0
          fi
          payload="$(node -e 'console.log(JSON.stringify({text: process.argv[1]}))' "$RELEASE_MESSAGE")"
          curl -f -sS -X POST -H 'Content-type: application/json' \
            -d "$payload" --url "$SLACK_SDK_RELEASES_WEBHOOK"

  python-release-check:
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.version.outputs.publish }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Check whether the Python version is new
        id: version
        working-directory: packages/python
        run: |
          version="$(python -c 'exec(open("src/traice/_version.py").read()); print(__version__)')"
          response_code="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' "https://pypi.org/pypi/traice-sdk/${version}/json")"
          if [[ "$response_code" == "404" ]]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          elif [[ "$response_code" == "200" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected PyPI response: HTTP $response_code" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  publish-python:
    runs-on: ubuntu-latest
    needs: python-release-check
    if: needs.python-release-check.outputs.publish == 'true'
    environment:
      name: pypi
      url: https://pypi.org/project/traice-sdk/${{ needs.python-release-check.outputs.version }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: packages/python
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Notify Slack of published Python package
        if: env.SLACK_SDK_RELEASES_WEBHOOK != ''
        env:
          SLACK_SDK_RELEASES_WEBHOOK: ${{ secrets.SLACK_SDK_RELEASES_WEBHOOK }}
          RELEASE_MESSAGE: Published traice-sdk==${{ needs.python-release-check.outputs.version }} to PyPI.
        shell: bash
        run: |
          if [[ "$SLACK_SDK_RELEASES_WEBHOOK" != https://hooks.slack.com/services/* ]]; then
            echo "::warning::SLACK_SDK_RELEASES_WEBHOOK must contain only a Slack webhook URL; skipping notification."
            exit 0
          fi
          payload="$(python -c 'import json, os; print(json.dumps({"text": os.environ["RELEASE_MESSAGE"]}))')"
          curl -f -sS -X POST -H 'Content-type: application/json' \
            -d "$payload" --url "$SLACK_SDK_RELEASES_WEBHOOK"
