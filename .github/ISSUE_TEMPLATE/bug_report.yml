name: Bug report
description: Report a reproducible bug.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Steps or a minimal repo.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "@traice/sdk@0.1.0"
